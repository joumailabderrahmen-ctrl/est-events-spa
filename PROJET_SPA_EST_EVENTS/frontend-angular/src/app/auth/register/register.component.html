<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-mortarboard-fill"></i>
      <h2>EST Events</h2>
      <p>Créer un compte étudiant</p>
    </div>

    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Nom complet</label>
        <input type="text" formControlName="name" class="form-control"
               [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
               placeholder="Votre nom et prénom">
        <div class="invalid-feedback">Nom requis (min 2 caractères)</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control"
               [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
               placeholder="exemple@est-dakhla.ac.ma">
        <div class="invalid-feedback">Email invalide</div>
      </div>

      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <input type="password" formControlName="password" class="form-control"
               [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
               placeholder="Min 6 caractères">
        <div class="invalid-feedback">Mot de passe min 6 caractères</div>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
    </form>

    <hr>
    <p class="text-center mb-0">
      Déjà un compte ?
      <a routerLink="/login" class="text-warning fw-bold">Se connecter</a>
    </p>
  </div>
</section>
